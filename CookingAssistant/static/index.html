<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烹饪助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0908;
            --bg-secondary: #1a1815;
            --bg-tertiary: #252220;
            --bg-elevated: #302d2a;
            --text-primary: #faf8f5;
            --text-secondary: #b8b2a8;
            --text-muted: #7a746b;
            --accent: #d4a574;
            --accent-light: rgba(212, 165, 116, 0.08);
            --accent-warm: #e8c4a0;
            --accent-dark: #8b6914;
            --border: rgba(212, 165, 116, 0.15);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 16px;
        }

        [data-theme="light"] {
            --bg-dark: #f5f3f0;
            --bg-secondary: #ffffff;
            --bg-tertiary: #faf8f5;
            --bg-elevated: #ffffff;
            --text-primary: #1a1815;
            --text-secondary: #6b6b6b;
            --text-muted: #999999;
            --border: rgba(26, 24, 21, 0.1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
        }

        [data-theme="green"] {
            --accent: #4a9d7c;
            --accent-light: rgba(74, 157, 124, 0.08);
            --accent-warm: #6bb896;
            --accent-dark: #2d7a5a;
            --border: rgba(74, 157, 124, 0.15);
        }

        [data-theme="blue"] {
            --accent: #5b8cd4;
            --accent-light: rgba(91, 140, 212, 0.08);
            --accent-warm: #7ba5e0;
            --accent-dark: #3a6ab5;
            --border: rgba(91, 140, 212, 0.15);
        }

        [data-theme="purple"] {
            --accent: #9b7dc4;
            --accent-light: rgba(155, 125, 196, 0.08);
            --accent-warm: #b094d4;
            --accent-dark: #7a5aa5;
            --border: rgba(155, 125, 196, 0.15);
        }

        [data-theme="rose"] {
            --accent: #d47c8c;
            --accent-light: rgba(212, 124, 140, 0.08);
            --accent-warm: #e0949c;
            --accent-dark: #b55a6a;
            --border: rgba(212, 124, 140, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .app {
            display: grid;
            grid-template-columns: 1fr 380px;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .menu-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .menu-toggle:hover svg {
            stroke: var(--bg-dark);
        }

        .menu-toggle svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-secondary);
            transition: stroke 0.3s;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: var(--bg-tertiary);
            border-left: 1px solid var(--border);
            z-index: 999;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
        }

        .sidebar-close {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .sidebar-close:hover {
            background: var(--bg-elevated);
        }

        .sidebar-close svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-secondary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .settings-section {
            margin-bottom: 28px;
        }

        .settings-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .theme-btn {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .theme-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 2px solid var(--text-muted);
        }

        .theme-btn:hover {
            transform: scale(1.1);
        }

        .theme-btn.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .theme-btn[data-color="gold"] {
            background: linear-gradient(135deg, #d4a574, #8b6914);
        }

        .theme-btn[data-color="green"] {
            background: linear-gradient(135deg, #4a9d7c, #2d7a5a);
        }

        .theme-btn[data-color="blue"] {
            background: linear-gradient(135deg, #5b8cd4, #3a6ab5);
        }

        .theme-btn[data-color="purple"] {
            background: linear-gradient(135deg, #9b7dc4, #7a5aa5);
        }

        .theme-btn[data-color="rose"] {
            background: linear-gradient(135deg, #d47c8c, #b55a6a);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .toggle-row:last-child {
            border-bottom: none;
        }

        .toggle-label {
            font-size: 14px;
            color: var(--text-primary);
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 26px;
            transition: all 0.3s;
        }

        .toggle-slider::before {
            position: absolute;
            content: '';
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent);
            border-color: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(22px);
            background: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-dark));
            transition: background 0.3s;
        }

        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(26, 24, 21, 0.8);
            backdrop-filter: blur(10px);
            transition: background 0.3s, border-color 0.3s;
        }

        .chat-logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 700;
            color: white;
            transition: background 0.3s;
        }

        .chat-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
        }

        .chat-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 300;
            transition: color 0.3s;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            animation: messageIn 0.4s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.8;
        }

        .message.bot .message-content {
            background: var(--bg-tertiary);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            border-bottom-right-radius: 4px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .message-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            padding-left: 4px;
            transition: color 0.3s;
        }

        .sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            transition: border-color 0.3s;
        }

        .sources-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        .source-tag {
            display: inline-block;
            padding: 5px 12px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 4px;
            font-size: 12px;
            margin-right: 6px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .source-tag:hover {
            background: var(--accent);
            color: white;
        }

        .filter-hint {
            margin-top: 14px;
            padding: 14px;
            background: rgba(212, 165, 116, 0.08);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .filter-hint strong {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
        }

        .chat-input-area {
            padding: 20px 32px;
            border-top: 1px solid var(--border);
            background: rgba(26, 24, 21, 0.9);
            backdrop-filter: blur(10px);
            transition: background 0.3s, border-color 0.3s;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 6px 6px 6px 20px;
            transition: all 0.3s;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            padding: 10px 0;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-send {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chat-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(212, 165, 116, 0.3);
        }

        .quick-questions {
            padding: 0 32px 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-area {
            background: var(--bg-tertiary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background 0.3s, border-color 0.3s;
        }

        .filter-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(26, 24, 21, 0.5);
            transition: background 0.3s, border-color 0.3s;
        }

        .filter-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .filter-header p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .filter-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .filter-content::-webkit-scrollbar {
            width: 4px;
        }

        .filter-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .filter-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-chip {
            padding: 10px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .filter-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s;
        }

        .filter-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .filter-input::placeholder {
            color: var(--text-muted);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .filter-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
        }

        .filter-btn.primary:hover {
            box-shadow: 0 4px 16px rgba(212, 165, 116, 0.3);
            transform: translateY(-1px);
        }

        .filter-btn.secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .filter-btn.secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-results {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .results-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.3s;
        }

        .results-count {
            font-weight: 400;
            color: var(--text-muted);
        }

        .result-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        .result-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .result-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .result-tag {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            transition: background 0.3s;
        }

        .result-tag.property {
            background: var(--accent-light);
            color: var(--accent);
        }

        .result-tag.taste {
            background: rgba(46, 125, 50, 0.15);
            color: #81c784;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
            }

            .filter-area {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <button class="menu-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">设置</span>
            <button class="sidebar-close" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="sidebar-content">
            <div class="settings-section">
                <div class="settings-section-title">主题颜色</div>
                <div class="theme-options">
                    <button class="theme-btn active" data-color="gold" onclick="setTheme('gold')" title="金色"></button>
                    <button class="theme-btn" data-color="green" onclick="setTheme('green')" title="翠绿"></button>
                    <button class="theme-btn" data-color="blue" onclick="setTheme('blue')" title="天蓝"></button>
                    <button class="theme-btn" data-color="purple" onclick="setTheme('purple')" title="紫罗兰"></button>
                    <button class="theme-btn" data-color="rose" onclick="setTheme('rose')" title="玫瑰"></button>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-section-title">显示模式</div>
                <div class="toggle-row">
                    <span class="toggle-label">深色模式</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle" checked onchange="toggleDarkMode()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">粒子特效</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="particleToggle" checked onchange="toggleParticles()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="app">
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-logo">厨</div>
                <div>
                    <div class="chat-title">烹饪助手</div>
                    <div class="chat-subtitle">999道精选菜谱 · 智能问答</div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        你好！我是你的智能烹饪助手。<br><br>
                        告诉我你有什么食材，或者直接问我任何烹饪问题。<br><br>
                        比如：<br>
                        · "我有番茄、鸡蛋、土豆"<br>
                        · "推荐一道清淡口味的菜"<br>
                        · "用烤箱能做什么菜"
                    </div>
                </div>
            </div>

            <div class="quick-questions">
                <button class="quick-btn" onclick="ask('我有番茄和鸡蛋，能做什么？')">番茄+鸡蛋</button>
                <button class="quick-btn" onclick="ask('推荐一道清淡口味的菜')">清淡口味</button>
                <button class="quick-btn" onclick="ask('用烤箱能做什么菜？')">烤箱菜</button>
                <button class="quick-btn" onclick="ask('哪些菜需要用到砂锅？')">砂锅菜</button>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="questionInput" placeholder="输入你的问题..." onkeypress="handleEnter(event)">
                    <button class="chat-send" onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="filter-area">
            <div class="filter-header">
                <h2>菜谱筛选</h2>
                <p>根据条件找到最适合的菜谱</p>
            </div>

            <div class="filter-content">
                <div class="filter-section">
                    <div class="filter-section-title">食材</div>
                    <input type="text" class="filter-input" id="filterIngredients" placeholder="输入食材，如：番茄,鸡蛋">
                </div>

                <div class="filter-section">
                    <div class="filter-section-title">调味品</div>
                    <input type="text" class="filter-input" id="filterSeasonings" placeholder="输入调味品，如：盐,酱油">
                </div>

                <div class="filter-section">
                    <div class="filter-section-title">厨具</div>
                    <div class="filter-chips" id="utensilChips">
                        <button class="filter-chip" onclick="toggleChip(this)">炒锅</button>
                        <button class="filter-chip" onclick="toggleChip(this)">蒸锅</button>
                        <button class="filter-chip" onclick="toggleChip(this)">烤箱</button>
                        <button class="filter-chip" onclick="toggleChip(this)">砂锅</button>
                        <button class="filter-chip" onclick="toggleChip(this)">电饭煲</button>
                        <button class="filter-chip" onclick="toggleChip(this)">微波炉</button>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-section-title">口味</div>
                    <div class="filter-chips" id="tasteChips">
                        <button class="filter-chip" onclick="toggleChip(this)">清淡</button>
                        <button class="filter-chip" onclick="toggleChip(this)">酸甜</button>
                        <button class="filter-chip" onclick="toggleChip(this)">酸辣</button>
                        <button class="filter-chip" onclick="toggleChip(this)">香辣</button>
                        <button class="filter-chip" onclick="toggleChip(this)">糖醋</button>
                        <button class="filter-chip" onclick="toggleChip(this)">咸鲜</button>
                        <button class="filter-chip" onclick="toggleChip(this)">酱香</button>
                        <button class="filter-chip" onclick="toggleChip(this)">蒜香</button>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-section-title">难度</div>
                    <div class="filter-chips" id="difficultyChips">
                        <button class="filter-chip" onclick="toggleChip(this)">简单</button>
                        <button class="filter-chip" onclick="toggleChip(this)">中等</button>
                        <button class="filter-chip" onclick="toggleChip(this)">困难</button>
                    </div>
                </div>

                <div class="filter-actions">
                    <button class="filter-btn primary" onclick="applyFilter()">筛选</button>
                    <button class="filter-btn secondary" onclick="resetFilter()">重置</button>
                </div>

                <div class="filter-results" id="filterResults">
                    <div class="results-title">
                        <span>推荐菜谱</span>
                        <span class="results-count" id="resultsCount">0 道</span>
                    </div>
                    <div id="resultsList">
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                    <path d="M2 17l10 5 10-5"></path>
                                    <path d="M2 12l10 5 10-5"></path>
                                </svg>
                            </div>
                            <div class="empty-state-text">设置筛选条件查看菜谱</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFilterResults = [];
        let particlesVisible = true;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function setTheme(color) {
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.theme-btn[data-color="${color}"]`).classList.add('active');
            
            const html = document.documentElement;
            html.removeAttribute('data-theme');
            
            if (color !== 'gold') {
                html.setAttribute('data-theme', color);
            }
            
            localStorage.setItem('themeColor', color);
        }

        function toggleDarkMode() {
            const isDark = document.getElementById('darkModeToggle').checked;
            document.body.setAttribute('data-theme', isDark ? '' : 'light');
            localStorage.setItem('darkMode', isDark);
        }

        function toggleParticles() {
            particlesVisible = document.getElementById('particleToggle').checked;
            document.getElementById('bg-canvas').style.opacity = particlesVisible ? '0.4' : '0';
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function ask(question) {
            document.getElementById('questionInput').value = question;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            const messagesDiv = document.getElementById('chatMessages');

            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="message-content">${question}</div>`;
            messagesDiv.appendChild(userMsg);

            input.value = '';

            const botMsg = document.createElement('div');
            botMsg.className = 'message bot';
            botMsg.innerHTML = `<div class="message-content">正在思考中...</div>`;
            messagesDiv.appendChild(botMsg);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: question})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    let html = `<div class="message-content">${data.answer.replace(/\n/g, '<br>')}</div>`;
                    
                    if (data.sources && data.sources.length > 0) {
                        html += `
                            <div class="sources">
                                <div class="sources-title">参考菜谱</div>
                                ${data.sources.map(s => `<span class="source-tag" onclick="filterByRecipe('${s.title}')">${s.title}</span>`).join('')}
                            </div>
                        `;
                    }

                    if (currentFilterResults.length > 0) {
                        html += `
                            <div class="filter-hint">
                                <strong>根据当前筛选结果进一步筛选：</strong>
                                <div>
                                    ${currentFilterResults.slice(0, 5).map(r => `<span class="source-tag" onclick="askMore('${r.title}')">${r.title}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    botMsg.innerHTML = html;
                } else {
                    botMsg.innerHTML = `<div class="message-content">抱歉：${data.error}</div>`;
                }
            })
            .catch(() => {
                botMsg.innerHTML = `<div class="message-content">演示模式：请先启动后端服务</div>`;
            });

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function filterByRecipe(recipeTitle) {
            ask(`详细介绍${recipeTitle}的做法`);
        }

        function askMore(recipeTitle) {
            ask(`关于「${recipeTitle}」，还有什么需要注意的吗？`);
        }

        function toggleChip(btn) {
            btn.classList.toggle('active');
        }

        function applyFilter() {
            const ingredients = document.getElementById('filterIngredients').value;
            const seasonings = document.getElementById('filterSeasonings').value;
            
            const tasteChips = document.querySelectorAll('#tasteChips .filter-chip.active');
            const tastes = Array.from(tasteChips).map(c => c.textContent);
            
            const utensilChips = document.querySelectorAll('#utensilChips .filter-chip.active');
            const utensils = Array.from(utensilChips).map(c => c.textContent);
            
            const difficultyChips = document.querySelectorAll('#difficultyChips .filter-chip.active');
            const difficulties = Array.from(difficultyChips).map(c => c.textContent);

            const filters = {
                ingredients: ingredients || null,
                seasonings: seasonings || null,
                tastes: tastes.length > 0 ? tastes : null,
                utensils: utensils.length > 0 ? utensils : null,
                difficulties: difficulties.length > 0 ? difficulties : null,
                limit: 20
            };

            fetch('/api/filter', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(filters)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    currentFilterResults = data.results;
                    displayResults(data);
                    updateChatWithFilterInfo(filters);
                } else {
                    displayEmpty('筛选失败，请重试');
                }
            })
            .catch(() => {
                currentFilterResults = [
                    {title: '番茄炒蛋', difficulty: '简单', property: '平性', taste: '清淡'},
                    {title: '蒜蓉炒菜心', difficulty: '简单', property: '凉性', taste: '蒜香'},
                    {title: '清蒸鲈鱼', difficulty: '中等', property: '平性', taste: '咸鲜'}
                ];
                displayResults({success: true, total: currentFilterResults.length, results: currentFilterResults});
            });
        }

        function updateChatWithFilterInfo(filters) {
            const conditions = [];
            if (filters.ingredients) conditions.push(`食材：${filters.ingredients}`);
            if (filters.seasonings) conditions.push(`调味品：${filters.seasonings}`);
            if (filters.tastes) conditions.push(`口味：${filters.tastes.join('、')}`);
            if (filters.utensils) conditions.push(`厨具：${filters.utensils.join('、')}`);
            if (filters.difficulties) conditions.push(`难度：${filters.difficulties.join('、')}`);

            if (conditions.length > 0) {
                const messagesDiv = document.getElementById('chatMessages');
                const filterMsg = document.createElement('div');
                filterMsg.className = 'message bot';
                filterMsg.innerHTML = `
                    <div class="message-content">
                        已根据你的筛选条件找到 <strong>${currentFilterResults.length}</strong> 道菜谱：<br>
                        ${conditions.join(' | ')}
                    </div>
                `;
                messagesDiv.appendChild(filterMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        function displayResults(data) {
            document.getElementById('resultsCount').textContent = `${data.total} 道`;

            const list = document.getElementById('resultsList');

            if (data.results.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </div>
                        <div class="empty-state-text">没有找到符合条件的菜谱</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = data.results.map(r => `
                <div class="result-card" onclick="ask('详细介绍${r.title}的做法')">
                    <div class="result-name">${r.title}</div>
                    <div class="result-tags">
                        <span class="result-tag">${r.difficulty}</span>
                        <span class="result-tag property">${r.property}</span>
                        <span class="result-tag taste">${r.taste}</span>
                    </div>
                </div>
            `).join('');
        }

        function displayEmpty(text) {
            document.getElementById('resultsList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <div class="empty-state-text">${text}</div>
                </div>
            `;
        }

        function resetFilter() {
            document.getElementById('filterIngredients').value = '';
            document.getElementById('filterSeasonings').value = '';
            document.querySelectorAll('.filter-chip.active').forEach(c => c.classList.remove('active'));
            currentFilterResults = [];
            displayEmpty('设置筛选条件查看菜谱');
            document.getElementById('resultsCount').textContent = '0 道';
        }

        if (localStorage.getItem('themeColor')) {
            setTheme(localStorage.getItem('themeColor'));
        }
        if (localStorage.getItem('darkMode') === 'false') {
            document.getElementById('darkModeToggle').checked = false;
            document.body.setAttribute('data-theme', 'light');
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);

        const colors = [
            new THREE.Color(0xd4a574),
            new THREE.Color(0xe8c4a0),
            new THREE.Color(0x8b6914),
            new THREE.Color(0xfaf8f5),
        ];

        for (let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 12;
            posArray[i + 1] = (Math.random() - 0.5) * 12;
            posArray[i + 2] = (Math.random() - 0.5) * 12;

            const color = colors[Math.floor(Math.random() * colors.length)];
            colorArray[i] = color.r;
            colorArray[i + 1] = color.g;
            colorArray[i + 2] = color.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.025,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.z = 4;

        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);

            particlesMesh.rotation.x += 0.0002;
            particlesMesh.rotation.y += 0.0003;

            particlesMesh.position.x += (mouseX * 0.3 - particlesMesh.position.x) * 0.01;
            particlesMesh.position.y += (mouseY * 0.3 - particlesMesh.position.y) * 0.01;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
